# envsubst template — ${PORT} is injected by the nginx image entrypoint
# (defaults to 80 via ENV in the Dockerfile; Railway sets its own PORT).
server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for react-router routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets can be cached forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json application/wasm image/svg+xml;
}
